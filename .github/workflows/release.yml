name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_flag: --mac
          - os: windows-latest
            build_flag: --win
          - os: ubuntu-latest
            build_flag: --linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            renderer/yarn.lock

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install renderer dependencies
        working-directory: renderer
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Package & Publish
        run: yarn electron-builder ${{ matrix.build_flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
